version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  node:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: node-server
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://root:example@mongodb:27017/mydatabase

  react:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: react-app
    ports:
      - "3001:3000"
    depends_on:
      - node

volumes:
  mongo-data:
